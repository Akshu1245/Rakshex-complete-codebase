# Railway deploy config for DevPulse backend.
#
# Reference: https://docs.railway.app/reference/config-as-code
#
# This file is consumed when you run `railway up` from the repo root or
# when Railway auto-deploys on push (if you've connected the GitHub repo
# in the Railway dashboard).
#
# Expected setup in the Railway project before first deploy:
#   1. A MySQL plugin attached       -> auto-injects DATABASE_URL
#   2. A Redis plugin attached       -> auto-injects REDIS_URL
#   3. The following service vars set manually:
#        JWT_SECRET                  (openssl rand -base64 64)
#        REFRESH_TOKEN_SECRET        (openssl rand -base64 64)
#        CSRF_SECRET                 (openssl rand -base64 64)
#        SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / EMAIL_FROM
#        OPENAI_API_KEY              or ANTHROPIC_API_KEY (at least one)
#        STRIPE_SECRET_KEY           (test or live)
#        STRIPE_WEBHOOK_SECRET
#        GITHUB_APP_ID
#        GITHUB_APP_PRIVATE_KEY      (full PEM, multiline)
#        GITHUB_WEBHOOK_SECRET
#        SENTRY_DSN                  (optional)
#        FRONTEND_URL                (e.g. https://app.devpulse.in)
#        NODE_ENV=production
#
# See LAUNCH_RUNBOOK.md for the full turnkey deploy sequence.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh scripts/migrate.sh && node dist/server/_core/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
