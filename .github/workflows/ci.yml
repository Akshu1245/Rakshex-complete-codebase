name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deployProduction:
        description: "Deploy the already-verified main branch"
        required: true
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: akshu1245/rakshex

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: rakshex
          POSTGRES_PASSWORD: rakshex
          POSTGRES_DB: rakshex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rakshex -d rakshex_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
        env:
          DATABASE_URL: postgresql://rakshex:rakshex@127.0.0.1:5432/rakshex_test
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: test-secret-ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: rakshex
          POSTGRES_PASSWORD: rakshex
          POSTGRES_DB: rakshex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rakshex -d rakshex_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test --grep=Smoke
        env:
          DATABASE_URL: postgresql://rakshex:rakshex@127.0.0.1:5432/rakshex_test
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: test-secret-ci
        continue-on-error: false
