name: Security scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"

env:
  HUSKY: "0"

jobs:
  scanner-regression:
    name: Credential and collection scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run security-focused unit tests
        run: pnpm run test:security
        env:
          JWT_SECRET: test-secret-security-scan
