version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: devpulse-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: devpulse
      MYSQL_DATABASE: devpulse
      MYSQL_USER: devpulse
      MYSQL_PASSWORD: devpulse
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
  redis_data:
