version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: devpulse-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: devpulse
      MYSQL_DATABASE: devpulse
      MYSQL_USER: devpulse
      MYSQL_PASSWORD: devpulse
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      target: worker
    container_name: devpulse-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=mysql://devpulse:devpulse@mysql:3306/devpulse
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-do-not-use-in-production}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-}
      - NODE_ENV=${NODE_ENV:-production}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-3}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Optional: Jaeger for local trace visualization
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: devpulse-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  mysql_data:
  redis_data:
