services:
  - type: web
    name: rakshex-backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ""
      - key: REDIS_URL
        fromService:
          name: rakshex-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: GITHUB_APP_ID
        value: ""
      - key: GITHUB_APP_PRIVATE_KEY
        value: ""
      - key: GITHUB_WEBHOOK_SECRET
        value: ""
      - key: SENTRY_DSN
        value: ""
    healthCheckPath: /api/health
    autoDeploy: true

  - name: rakshex-redis
    type: redis
    plan: starter
    ipAllowList: []