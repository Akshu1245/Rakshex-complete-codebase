# Production / staging compose overlay
# Usage:
#   export POSTGRES_PASSWORD=... JWT_SECRET=... APP_URL=...
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    restart: always

  redis:
    restart: always

  api:
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://rakshex:${POSTGRES_PASSWORD}@postgres:5432/rakshex
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_URL: ${APP_URL:?APP_URL is required}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.rakshex.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}

  worker:
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://rakshex:${POSTGRES_PASSWORD}@postgres:5432/rakshex
      JWT_SECRET: ${JWT_SECRET}

  web:
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_TS_API_URL: ${NEXT_PUBLIC_TS_API_URL:-${APP_URL}}
